version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: prod
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
  api:
    build: .
    restart: always # Container restart policy validated
    env_file: .env.production
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy # Espera a que la BD esté lista

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck: # DB healthcheck validated
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-portfolio}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
