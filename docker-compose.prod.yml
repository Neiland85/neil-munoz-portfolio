services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: neil-munoz-portfolio-api-prod
    env_file:
      - .env.production
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: neil-munoz-portfolio-nginx-prod
    depends_on:
      - api
    ports:
      - "8001:80"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
