services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: neil-munoz-portfolio:local
    container_name: neil-munoz-portfolio-local
    environment:
      APP_ENV: local
      APP_NAME: nm-portfolio-api
      APP_DEBUG: "false"
      LOG_LEVEL: INFO
      API_BASE_URL: http://127.0.0.1:8001
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8001,http://127.0.0.1:8001
      DATABASE_URL: sqlite:///./data/local.db
      SECRET_KEY: local-development-secret-key-12345
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
